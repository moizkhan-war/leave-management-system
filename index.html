<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 Navbar -->
<nav style="background:#333; padding:10px;">
  <a href="index.html" style="color:white; margin:10px;">Dashboard</a>
  <a href="apply.html" style="color:white; margin:10px;">Apply Leave</a>
  <a href="history.html" style="color:white; margin:10px;">History</a>
  <a href="admin.html" style="color:white; margin:10px;">Admin</a>
</nav>

<!-- 📊 Dashboard -->
<div class="container">
  <h1 class="text-center mt-4">Dashboard</h1>

  <div class="row mt-4">

    <div class="col-md-3">
      <div class="card text-center p-3 shadow">
        <h5>Total Employees</h5>
        <h2>50</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center p-3 shadow">
        <h5>Leaves Applied</h5>
        <h2>20</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center p-3 shadow">
        <h5>Pending</h5>
        <h2>5</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center p-3 shadow">
        <h5>Approved</h5>
        <h2>15</h2>
      </div>
    </div>

  </div>
</div>

<!-- 📈 Chart (Bonus) -->
<div class="container mt-5">
  <h3 class="text-center">Leaves per Month</h3>
  <canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Jan', 'Feb', 'Mar', 'Apr'],
    datasets: [{
      label: 'Leaves',
      data: [5, 8, 6, 10]
    }]
  }
});
</script>

</body>
</html>
